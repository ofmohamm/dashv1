<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Syracuse Dashboard</title>
  <style>
    :root {
      --text: rgba(255, 255, 255, 0.94);
      --muted: rgba(255, 255, 255, 0.68);
      --faint: rgba(255, 255, 255, 0.18);
      --card: rgba(12, 22, 34, 0.42);
      --card-border: rgba(255, 255, 255, 0.12);
      --shadow: rgba(0, 0, 0, 0.28);
      --accent: #8aa0ff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(177, 190, 201, 0.25), rgba(10, 20, 32, 0.72)),
        linear-gradient(90deg, rgba(9, 16, 26, 0.25), rgba(9, 16, 26, 0.1)),
        url("https://images.unsplash.com/photo-1473773508845-188df298d2d1?auto=format&fit=crop&w=2400&q=85");
      background-size: cover;
      background-position: center;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 50% 42%, rgba(255, 255, 255, 0.07), transparent 23rem),
        linear-gradient(180deg, rgba(2, 8, 16, 0.05), rgba(2, 8, 16, 0.62));
      pointer-events: none;
    }

    .dashboard {
      position: relative;
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(2rem, 1fr) minmax(24rem, 38rem) minmax(19rem, 23rem) minmax(3rem, 1fr);
      align-items: center;
      gap: clamp(1.5rem, 3.5vw, 3.5rem);
      padding: clamp(1rem, 3vw, 3rem);
    }

    .centerpiece {
      grid-column: 2;
      text-align: center;
      transform: translateY(-1.6rem);
      text-shadow: 0 1rem 3rem var(--shadow);
    }

    .time {
      font-size: clamp(5rem, 10vw, 8.8rem);
      line-height: 0.95;
      font-weight: 750;
      letter-spacing: -0.08em;
    }

    .meta {
      margin-top: 1rem;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.55rem;
      font-size: clamp(1.05rem, 1.8vw, 1.55rem);
      font-weight: 500;
      color: var(--text);
    }

    .weather-icon {
      width: 1.3rem;
      height: 1.3rem;
      opacity: 0.86;
    }

    .agenda-card {
      grid-column: 3;
      width: min(100%, 23.5rem);
      justify-self: center;
      border: 1px solid var(--card-border);
      border-radius: 1.6rem;
      background: var(--card);
      backdrop-filter: blur(24px) saturate(125%);
      box-shadow: 0 2rem 7rem var(--shadow);
      padding: 1.35rem;
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 0.75rem;
    }

    .date {
      font-size: 1.45rem;
      font-weight: 720;
      letter-spacing: -0.03em;
    }

    .events {
      display: grid;
      gap: 0.7rem;
      max-height: 27rem;
      overflow: auto;
      padding-right: 0.15rem;
      scrollbar-width: none;
      -webkit-mask-image: linear-gradient(to bottom, #000 calc(100% - 1.6rem), transparent);
      mask-image: linear-gradient(to bottom, #000 calc(100% - 1.6rem), transparent);
    }

    .events::-webkit-scrollbar { display: none; }

    .event {
      display: block;
      padding: 0.82rem 0;
      border-top: 1px solid var(--faint);
      color: inherit;
      text-decoration: none;
      border-radius: 0.7rem;
    }

    .events > :first-child { border-top: 0; }

    .event.has-link { cursor: pointer; }

    .event.has-link:hover .event-title { text-decoration: underline; }

    /* "Next up" hero, inspired by Apple's highlighted event block */
    .event.featured {
      border-top: 0;
      padding: 0.92rem 1rem;
      margin-bottom: 0.1rem;
      border-radius: 1rem;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: linear-gradient(135deg, rgba(108, 124, 240, 0.6), rgba(140, 110, 235, 0.34));
      box-shadow: 0 0.7rem 1.8rem rgba(0, 0, 0, 0.28);
    }

    .event.featured .event-time { color: rgba(255, 255, 255, 0.86); }
    .event.featured .event-dot { background: #fff; }

    /* "Now" / "Next" / countdown label giving the hero an explicit meaning */
    .event-status {
      margin-bottom: 0.3rem;
      color: rgba(255, 255, 255, 0.82);
      font-size: 0.82rem;
      font-weight: 600;
    }

    .event-time {
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.3;
      font-variant-numeric: tabular-nums;
      margin-top: 0.2rem;
    }

    .event-dot {
      flex: none;
      width: 0.52rem;
      height: 0.52rem;
      border-radius: 50%;
      background: var(--accent);
      transform: translateY(-0.05rem);
    }

    .event-chevron {
      margin-left: auto;
      color: var(--muted);
      font-size: 1.15rem;
      line-height: 1;
      font-weight: 400;
    }

    .event.featured .event-chevron { color: rgba(255, 255, 255, 0.82); }

    .day-header {
      color: var(--muted);
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 700;
      padding: 1rem 0 0.35rem;
      border-top: 1px solid var(--faint);
    }

    .day-header + .event { border-top: 0; }

    .event-title-row {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
    }

    .event-title {
      font-size: 1rem;
      font-weight: 670;
      letter-spacing: -0.02em;
      line-height: 1.22;
    }

    .event-location {
      margin-top: 0.25rem;
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.3;
    }

    .empty {
      border-top: 1px solid var(--faint);
      padding: 1.25rem 0 0.2rem;
      color: var(--muted);
      line-height: 1.45;
    }

    .empty-note {
      color: var(--muted);
      font-size: 0.9rem;
      padding: 0.1rem 0 0.55rem;
    }

    .updated {
      color: var(--muted);
      font-size: 0.72rem;
      letter-spacing: 0.02em;
      margin-top: 0.9rem;
      opacity: 0.85;
    }

    .updated:empty { display: none; }

    .empty strong {
      color: var(--text);
      font-weight: 700;
    }

    .empty code {
      color: var(--text);
      font-size: 0.78rem;
      overflow-wrap: anywhere;
    }

    .controls {
      position: fixed;
      top: 1rem;
      right: 1rem;
      display: flex;
      gap: 0.5rem;
      padding: 0.3rem;
      border-radius: 999px;
      background: rgba(10, 20, 32, 0.32);
      border: 1px solid rgba(255, 255, 255, 0.14);
      backdrop-filter: blur(18px) saturate(120%);
      opacity: 0.62;
      transition: opacity 180ms ease;
    }

    .controls:hover { opacity: 1; }

    button {
      color: var(--text);
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 999px;
      padding: 0.5rem 0.95rem;
      font: inherit;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover { background: rgba(255, 255, 255, 0.18); }

    .hint {
      position: fixed;
      left: 50%;
      bottom: 1.4rem;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.72);
      font-size: 0.76rem;
      letter-spacing: 0.01em;
      text-shadow: 0 1rem 2rem rgba(0, 0, 0, 0.55);
    }

    .hide-ui .controls,
    .hide-ui .hint {
      opacity: 0;
      pointer-events: none;
    }

    @media (max-width: 980px) {
      body { overflow: auto; }
      .dashboard {
        grid-template-columns: 1fr;
        align-content: center;
        padding-block: 5rem;
      }
      .centerpiece,
      .agenda-card { grid-column: 1; }
      .agenda-card { width: min(92vw, 25rem); }
    }
  </style>
</head>
<body>
  <main class="dashboard">
    <section class="centerpiece" aria-label="Clock and weather">
      <div class="time" id="time">--:--</div>
      <div class="meta">
        <span id="city">Syracuse</span>
        <svg class="weather-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M7.8 18.5h9.1a4.1 4.1 0 0 0 .3-8.2 6 6 0 0 0-11.6 1.5A3.4 3.4 0 0 0 7.8 18.5Z" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span id="temp">--°</span>
      </div>
    </section>

    <aside class="agenda-card" aria-label="Today's Outlook calendar">
      <div class="card-header">
        <div class="date" id="date">Today</div>
      </div>
      <div class="events" id="events"></div>
      <div class="updated" id="updated"></div>
    </aside>
  </main>

  <div class="controls">
    <button id="refreshBtn" type="button">Refresh</button>
    <button id="fullscreenBtn" type="button">Fullscreen</button>
  </div>
  <div class="hint">Click an event to join · F11 for fullscreen</div>

  <script>
    const WEATHER = { city: "Syracuse", latitude: 43.0481, longitude: -76.1474 };

    const els = {
      time: document.getElementById("time"),
      date: document.getElementById("date"),
      temp: document.getElementById("temp"),
      city: document.getElementById("city"),
      events: document.getElementById("events"),
      updated: document.getElementById("updated"),
      refreshBtn: document.getElementById("refreshBtn"),
      fullscreenBtn: document.getElementById("fullscreenBtn")
    };

    function updateClock() {
      const now = new Date();
      els.time.textContent = now.toLocaleTimeString("en-US", {
        hour: "numeric",
        minute: "2-digit",
        hour12: true
      }).replace(/\s?(AM|PM)$/i, "");
      els.date.textContent = now.toLocaleDateString("en-US", {
        weekday: "long",
        month: "short",
        day: "numeric"
      });
    }

    async function updateWeather() {
      els.city.textContent = WEATHER.city;
      try {
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${WEATHER.latitude}&longitude=${WEATHER.longitude}&current=temperature_2m&temperature_unit=fahrenheit`;
        const res = await fetch(url);
        const data = await res.json();
        els.temp.textContent = `${Math.round(data.current.temperature_2m)}°`;
      } catch {
        els.temp.textContent = "--°";
      }
    }

    function formatEventTime(event) {
      if (event.isAllDay) return "All day";
      const start = new Date(event.start);
      const end = new Date(event.end);
      const opts = { hour: "numeric", minute: "2-digit", hour12: true };
      const clean = date => date.toLocaleTimeString("en-US", opts).replace(/\s?(AM|PM)$/i, "");
      return `${clean(start)} – ${clean(end)}`;
    }

    function dayLabel(dateStr) {
      const [y, m, d] = dateStr.split("-").map(Number);
      const date = new Date(y, m - 1, d);
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const diff = Math.round((date - today) / 86400000);
      if (diff === 0) return "Today";
      if (diff === 1) return "Tomorrow";
      return date.toLocaleDateString("en-US", { weekday: "long", month: "short", day: "numeric" });
    }

    function localDateStr(date) {
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}-${String(date.getDate()).padStart(2, "0")}`;
    }

    // Deterministic hero label: All day / Now / a live countdown today / Next.
    function statusLabel(event) {
      if (event.isAllDay) return "All day";
      const now = Date.now();
      const start = new Date(event.start).getTime();
      const end = new Date(event.end).getTime();
      if (start <= now && end > now) return "Now";

      const minutes = Math.round((start - now) / 60000);
      if (event.date === localDateStr(new Date()) && minutes > 0) {
        if (minutes < 60) return `Starts in ${minutes} min`;
        const h = Math.floor(minutes / 60);
        const m = minutes % 60;
        return m ? `Starts in ${h}h ${m}m` : `Starts in ${h}h`;
      }
      return "Next";
    }

    function renderEventHtml(event, featured) {
      const loc = event.location ? `<div class="event-location">${escapeHtml(event.location)}</div>` : "";
      const chevron = event.meetingUrl ? `<span class="event-chevron" aria-hidden="true">›</span>` : "";
      const status = featured ? `<div class="event-status">${escapeHtml(statusLabel(event))}</div>` : "";
      const body = `
        ${status}
        <div class="event-title-row">
          <span class="event-dot" aria-hidden="true"></span>
          <div class="event-title">${escapeHtml(event.subject || "Untitled")}</div>
          ${chevron}
        </div>
        <div class="event-time">${formatEventTime(event)}</div>
        ${loc}
      `;

      const cls = `event${featured ? " featured" : ""}${event.meetingUrl ? " has-link" : ""}`;
      if (event.meetingUrl) {
        return `<a class="${cls}" href="${escapeAttr(event.meetingUrl)}" target="_blank" rel="noopener noreferrer">${body}</a>`;
      }
      return `<div class="${cls}">${body}</div>`;
    }

    function renderAgenda(allEvents) {
      // Hide events that have already ended; the agenda is about what's ahead.
      const now = Date.now();
      const upcoming = allEvents.filter(e => new Date(e.end).getTime() > now);

      if (!upcoming.length) {
        renderMessage("No upcoming events.");
        return;
      }

      const todayStr = localDateStr(new Date());
      const hero = upcoming[0];
      const parts = [];

      // When today is finished, say so before rolling into the next day's events.
      if (!upcoming.some(e => e.date === todayStr)) {
        parts.push(`<div class="empty-note">No more events today.</div>`);
      }

      let lastDate = null;
      for (const event of upcoming) {
        if (event.date && event.date !== lastDate) {
          lastDate = event.date;
          const label = dayLabel(event.date);
          if (label !== "Today") {
            parts.push(`<div class="day-header">${escapeHtml(label)}</div>`);
          }
        }
        parts.push(renderEventHtml(event, event === hero));
      }
      els.events.innerHTML = parts.join("");
    }

    function renderMessage(message) {
      els.events.innerHTML = `<div class="empty">${message}</div>`;
    }

    // Cache the last good payload so a failed refresh keeps the screen useful.
    const state = { events: [], setupMessage: null, lastUpdated: null, stale: false };

    function renderUpdatedNote() {
      if (state.stale && state.lastUpdated) {
        const mins = Math.max(0, Math.round((Date.now() - state.lastUpdated) / 60000));
        els.updated.textContent = mins < 1 ? "Offline · updated just now" : `Offline · updated ${mins}m ago`;
      } else {
        els.updated.textContent = "";
      }
    }

    function render() {
      if (state.setupMessage) {
        renderMessage(`<strong>ICS setup needed.</strong><br>${escapeHtml(state.setupMessage)}<br><br>Edit <code>config.json</code>, then refresh.`);
      } else {
        renderAgenda(state.events);
      }
      renderUpdatedNote();
    }

    async function refreshCalendar() {
      try {
        const res = await fetch("/api/events", { cache: "no-store" });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || "Calendar failed to load.");
        state.setupMessage = data.message && !data.configured ? data.message : null;
        state.events = data.events || [];
        state.lastUpdated = Date.now();
        state.stale = false;
        render();
      } catch (error) {
        // Graceful offline: keep the last known agenda instead of blanking out.
        if (state.lastUpdated) {
          state.stale = true;
          render();
        } else {
          renderMessage(`<strong>Calendar failed to load.</strong><br>${escapeHtml(error.message || String(error))}`);
        }
      }
    }

    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen?.();
        document.body.classList.add("hide-ui");
      } else {
        document.exitFullscreen?.();
        document.body.classList.remove("hide-ui");
      }
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttr(value) {
      return escapeHtml(value).replaceAll("`", "&#096;");
    }

    els.refreshBtn.addEventListener("click", refreshCalendar);
    els.fullscreenBtn.addEventListener("click", toggleFullscreen);

    let hideTimer;
    window.addEventListener("mousemove", () => {
      document.body.classList.remove("hide-ui");
      clearTimeout(hideTimer);
      hideTimer = setTimeout(() => document.body.classList.add("hide-ui"), 3000);
    });

    updateClock();
    updateWeather();
    refreshCalendar();
    setInterval(updateClock, 1000);
    setInterval(updateWeather, 15 * 60 * 1000);
    setInterval(refreshCalendar, 5 * 60 * 1000);
    // Re-render from cached data between fetches so the hero countdown ticks,
    // finished events fall away, and the offline note ages in real time.
    setInterval(() => { if (state.lastUpdated) render(); }, 30 * 1000);
  </script>
</body>
</html>
